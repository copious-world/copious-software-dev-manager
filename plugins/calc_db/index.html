<div id="$ctxt-calc_db-outer" >
    <div class="title_calc_db">
        <span>Calculator Components customization interface</span>
<button onclick="populate_calc_db_$ctxt('concerns-$ctxt-calc_db-outer','files-$ctxt-calc_db-outer-secondary-item')" >activate</button>
<button onclick="save_cal_db_$ctxt(event)" >save all</button>
<button class="button_calc_db" onclick="calc_db_update_view_$ctxt(event)" >update view (debug)</button>
    </div>
<div class="four-panels-calc_db">
<div id="form-$ctxt-calc_db-outer" class="column-calc_db">
        <form id = "form-$ctxt-calc_db-outer-id" action="javascript:update_entry_$ctxt()">
            <input id="form-$ctxt-calc_db-outer-id-concern" type="hidden"  value="" />
            <div class="key-line" id="form-$ctxt-calc_db-outer-id-concern-show" >select to right</div>

            <input id="form-$ctxt-calc_db-outer-id-file_key" type="hidden"  value="" />
            <div class="key-line url-line" id="form-$ctxt-calc_db-outer-id-file_key-show" >select next right</div>

            <input id="form-$ctxt-calc_db-outer-id-field" type="hidden"  value="" />
            <div class="key-line" id="form-$ctxt-calc_db-outer-id-field-show" >select far right</div>

            <input id="form-$ctxt-calc_db-outer-id-name" type="text"  value="" />
            <br>
            <select id="form-$ctxt-calc_db-outer-id-content-type" value="@<type>" onchange="update_content_file_field_$ctxt(event,'form-$ctxt-calc_db-outer-id-content-file')" >
                <option>
                    @&lt;type&gt;
                </option>
                <option>
                    html
                </option>
                <option>
                    svg
                </option>
            </select>
            <br>
            <input type="file" id="form-$ctxt-calc_db-outer-id-content-select-file" onchange="update_content_file_name_and_type_$ctxt(event,'form-$ctxt-calc_db-outer-id-content-file','form-$ctxt-calc_db-outer-id-content-type')" />
            <input id="form-$ctxt-calc_db-outer-id-content-file" type="text" value="" />
            <div>
                <button class="button_url_calc_db" onclick="create_content_file_name_and_type_$ctxt(event,'form-$ctxt-calc_db-outer-id-content-file','form-$ctxt-calc_db-outer-id-content-type')">create</button>
                <button class="button_url_calc_db" onclick="view_content_file_name_and_type_$ctxt(event,'form-$ctxt-calc_db-outer-id-content-file','form-$ctxt-calc_db-outer-id-content-type')">view</button>
            </div>
            <input type="submit"  value="save change" />
        </form>
</div>
